<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RugPump | Simulador de FOMO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { background-color: #09090b; color: #fafafa; font-family: 'Inter', sans-serif; }
        .neon-green { color: #22c55e; text-shadow: 0 0 10px rgba(34, 197, 94, 0.5); }
        .neon-red { color: #ef4444; text-shadow: 0 0 10px rgba(239, 68, 68, 0.5); }
        .glass { background: rgba(24, 24, 27, 0.8); backdrop-filter: blur(10px); border: 1px solid #3f3f46; }
        .fomo-pulse { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body class="p-4">
    <header class="flex justify-between items-center mb-6 glass p-4 rounded-2xl">
        <h1 class="text-3xl font-black tracking-tighter italic neon-green">RUGPUMP <span class="text-white text-sm not-italic font-light ml-2">v1.0 Simulator</span></h1>
        <div class="text-right">
            <p class="text-gray-400 text-xs uppercase tracking-widest">Saldo Disponível</p>
            <p id="balance" class="text-2xl font-bold">$10,000.00</p>
        </div>
    </header>

    <div class="grid grid-cols-12 gap-6">
        <div class="col-span-12 lg:col-span-3 space-y-4">
            <div class="glass p-4 rounded-xl">
                <button onclick="createMemecoin()" class="w-full bg-green-600 hover:bg-green-500 py-3 rounded-lg font-bold transition-all mb-4">
                    + LANÇAR NOVA MEMECOIN
                </button>
                <h2 class="text-sm font-semibold mb-3 text-gray-500 uppercase">Mercado Live</h2>
                <div id="coin-list" class="space-y-2 overflow-y-auto max-h-[500px] pr-2">
                    </div>
            </div>
        </div>

        <div class="col-span-12 lg:col-span-6 space-y-6">
            <div class="glass p-4 rounded-xl relative">
                <div class="flex justify-between items-center mb-4">
                    <div>
                        <h2 id="active-coin-name" class="text-2xl font-bold">---</h2>
                        <div id="danger-badge" class="hidden bg-red-900 text-red-200 text-[10px] px-2 py-1 rounded inline-block font-bold">ALTO RISCO (70%)</div>
                    </div>
                    <div class="flex space-x-2">
                        <button class="px-3 py-1 bg-zinc-800 rounded text-xs hover:bg-zinc-700">LIVE</button>
                        <button class="px-3 py-1 bg-zinc-800 rounded text-xs hover:bg-zinc-700">1H</button>
                        <button class="px-3 py-1 bg-zinc-800 rounded text-xs hover:bg-zinc-700">4H</button>
                    </div>
                </div>
                <div id="chart-container" class="w-full h-[400px]"></div>
                
                <div class="grid grid-cols-2 gap-4 mt-6">
                    <button onclick="buyAction()" class="bg-zinc-100 text-black py-4 rounded-xl font-black text-lg hover:scale-[1.02] active:scale-95 transition-all">COMPRAR</button>
                    <button onclick="rugPullAction()" class="bg-red-600 text-white py-4 rounded-xl font-black text-lg hover:bg-red-500 fomo-pulse">VENDER TUDO (RUG)</button>
                </div>
            </div>

            <div class="grid grid-cols-3 gap-4">
                <div class="glass p-4 rounded-xl text-center">
                    <p class="text-xs text-gray-500">Market Cap</p>
                    <p id="stat-mcap" class="font-bold text-lg">$0</p>
                </div>
                <div class="glass p-4 rounded-xl text-center">
                    <p class="text-xs text-gray-500">Volume (24h)</p>
                    <p id="stat-vol" class="font-bold text-lg">$0</p>
                </div>
                <div class="glass p-4 rounded-xl text-center">
                    <p class="text-xs text-gray-500">Holders</p>
                    <p id="stat-holders" class="font-bold text-lg">0</p>
                </div>
            </div>
        </div>

        <div class="col-span-12 lg:col-span-3 space-y-4">
            <div class="glass p-4 rounded-xl">
                <h3 class="font-bold mb-4 border-b border-zinc-700 pb-2">Meu Portfolio</h3>
                <div id="portfolio-list" class="text-sm space-y-3">
                    <p class="text-gray-500 italic">Sem trades abertas...</p>
                </div>
            </div>
            <div class="glass p-4 rounded-xl">
                <h3 class="font-bold mb-4 border-b border-zinc-700 pb-2">Feed Global (FOMO)</h3>
                <div id="global-feed" class="text-[10px] space-y-2 opacity-70">
                    <p>🟢 Baleia comprou $4,500 de SOL</p>
                    <p>🔴 User "Xpto" levou RugPull em PEPE</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURAÇÃO INICIAL ---
        let balance = 10000;
        let activeCoin = null;
        let portfolio = {};
        let coins = [
            { id: 'btc', name: 'Bitcoin', price: 65200, isMeme: false, risk: 0, mcap: '1.2T', vol: '35B', holders: '50M' },
            { id: 'eth', name: 'Ethereum', price: 3450, isMeme: false, risk: 0, mcap: '400B', vol: '15B', holders: '120M' },
            { id: 'sol', name: 'Solana', price: 145, isMeme: false, risk: 0, mcap: '65B', vol: '4B', holders: '12M' },
            { id: 'rug1', name: 'MOON_INU', price: 0.0004, isMeme: true, risk: 70, mcap: '150K', vol: '20K', holders: '450', createdAt: Date.now() }
        ];

        // --- INICIALIZAÇÃO DO GRÁFICO (TradingView) ---
        const chart = LightweightCharts.createChart(document.getElementById('chart-container'), {
            layout: { backgroundColor: 'transparent', textColor: '#d1d5db' },
            grid: { vertLines: { color: '#27272a' }, horzLines: { color: '#27272a' } },
            crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
            rightPriceScale: { borderColor: '#3f3f46' },
            timeScale: { borderColor: '#3f3f46' },
        });

        const candleSeries = chart.addCandlestickSeries({
            upColor: '#22c55e', downColor: '#ef4444', borderVisible: false, wickUpColor: '#22c55e', wickDownColor: '#ef4444'
        });

        // Gerar dados iniciais do gráfico
        function generateChartData(basePrice) {
            let data = [];
            let time = Math.floor(Date.now() / 1000) - 100 * 60;
            for (let i = 0; i < 100; i++) {
                const open = basePrice * (1 + (Math.random() - 0.5) * 0.02);
                const high = open * 1.01;
                const low = open * 0.99;
                const close = open * (1 + (Math.random() - 0.5) * 0.02);
                data.push({ time: time + i * 60, open, high, low, close });
            }
            return data;
        }

        // --- LÓGICA DO JOGO ---
        function updateUI() {
            document.getElementById('balance').innerText = `$${balance.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            
            const list = document.getElementById('coin-list');
            list.innerHTML = '';
            coins.forEach(coin => {
                const div = document.createElement('div');
                div.className = `p-3 rounded-lg flex justify-between items-center cursor-pointer hover:bg-zinc-800 transition ${activeCoin?.id === coin.id ? 'bg-zinc-800 ring-1 ring-green-500' : 'bg-zinc-900'}`;
                div.onclick = () => selectCoin(coin);
                div.innerHTML = `
                    <div>
                        <p class="font-bold">${coin.name}</p>
                        <p class="text-[10px] text-gray-500 uppercase">${coin.isMeme ? 'Memecoin' : 'Real Asset'}</p>
                    </div>
                    <p class="${coin.isMeme ? 'neon-red' : 'neon-green'} font-mono">$${coin.price.toFixed(coin.price < 1 ? 6 : 2)}</p>
                `;
                list.appendChild(div);
            });

            const portList = document.getElementById('portfolio-list');
            portList.innerHTML = '';
            Object.keys(portfolio).forEach(id => {
                const p = portfolio[id];
                const coin = coins.find(c => c.id === id);
                const profit = (coin.price * p.amount) - p.cost;
                portList.innerHTML += `
                    <div class="flex justify-between border-l-2 border-green-500 pl-2">
                        <span>${coin.name}</span>
                        <span class="${profit >= 0 ? 'text-green-500' : 'text-red-500'} font-bold">${profit >= 0 ? '+' : ''}${profit.toFixed(2)}</span>
                    </div>
                `;
            });
        }

        function selectCoin(coin) {
            activeCoin = coin;
            document.getElementById('active-coin-name').innerText = coin.name;
            document.getElementById('danger-badge').style.display = coin.isMeme ? 'inline-block' : 'none';
            document.getElementById('stat-mcap').innerText = `$${coin.mcap}`;
            document.getElementById('stat-vol').innerText = `$${coin.vol}`;
            document.getElementById('stat-holders').innerText = coin.holders;
            candleSeries.setData(generateChartData(coin.price));
            updateUI();
        }

        function createMemecoin() {
            const name = prompt("Nome da tua Memecoin (ex: ROCKET_PUMP):");
            if(!name) return;
            const newCoin = {
                id: 'meme-' + Date.now(),
                name: name.toUpperCase(),
                price: 0.0001,
                isMeme: true,
                risk: Math.random() < 0.7 ? 70 : 0,
                mcap: '10K',
                vol: '5K',
                holders: '1',
                createdAt: Date.now()
            };
            coins.unshift(newCoin);
            selectCoin(newCoin);
        }

        function buyAction() {
            if(!activeCoin) return;
            const amount = 1000;
            if(balance >= amount) {
                balance -= amount;
                if(!portfolio[activeCoin.id]) portfolio[activeCoin.id] = { amount: 0, cost: 0 };
                portfolio[activeCoin.id].amount += amount / activeCoin.price;
                portfolio[activeCoin.id].cost += amount;
                updateUI();
            }
        }

        function rugPullAction() {
            if(!activeCoin || !portfolio[activeCoin.id]) return;
            const sellValue = portfolio[activeCoin.id].amount * activeCoin.price;
            balance += sellValue;
            
            // Simular o RugPull após a venda do jogador se for meme de risco
            if(activeCoin.isMeme && activeCoin.risk > 0) {
                activeCoin.price *= 0.01; // Cai 99%
                activeCoin.mcap = "REKT";
                candleSeries.setData(generateChartData(activeCoin.price));
            }
            
            delete portfolio[activeCoin.id];
            updateUI();
        }

        // Loop de Preços Live
        setInterval(() => {
            coins.forEach(c => {
                const vol = c.isMeme ? 0.15 : 0.01;
                c.price *= (1 + (Math.random() - 0.5) * vol);
                
                // Lógica dos 5 minutos: Após 5 min, se for de risco, chance de crashar sozinha
                if(c.isMeme && c.risk > 0 && (Date.now() - c.createdAt) > 300000) {
                    if(Math.random() < 0.05) c.price *= 0.5; // Começa a morrer
                }
            });
            if(activeCoin) {
                const lastData = {
                    time: Math.floor(Date.now() / 1000),
                    open: activeCoin.price,
                    high: activeCoin.price * 1.02,
                    low: activeCoin.price * 0.98,
                    close: activeCoin.price
                };
                candleSeries.update(lastData);
            }
            updateUI();
        }, 2000);

        // Iniciar com BTC
        selectCoin(coins[0]);
    </script>
</body>
</html>
