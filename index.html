<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RugPump | FOMO Experience</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .fomo-purple { background-color: #7B3FE4; }
        .fomo-text-purple { color: #7B3FE4; }
        .card-dark { background-color: #121212; border: 1px solid #1f1f1f; }
        .chart-line { fill: none; stroke: #22c55e; stroke-width: 3; stroke-linecap: round; filter: drop-shadow(0 0 8px rgba(34, 197, 94, 0.4)); }
        .chart-area { fill: url(#gradient); opacity: 0.2; }
        .rug-anim { animation: rug-shake 0.2s infinite; }
        @keyframes rug-shake { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-1px, -2px); } 100% { transform: translate(1px, 1px); } }
        ::-webkit-scrollbar { display: none; }
        .nav-active { color: #7B3FE4; }
        .buy-dot { fill: #22c55e; stroke: #000; stroke-width: 2; }
        .sell-dot { fill: #ef4444; stroke: #000; stroke-width: 2; }
    </style>
</head>
<body class="max-w-md mx-auto h-screen overflow-hidden flex flex-col">

    <div id="view-market" class="flex-1 flex flex-col overflow-hidden">
        <header class="p-6">
            <div class="flex justify-between items-center mb-2">
                <h1 class="text-3xl font-extrabold tracking-tight">Portfolio</h1>
                <div class="flex gap-4">
                    <i data-lucide="search" class="w-6 h-6 text-zinc-500"></i>
                    <i data-lucide="bell" class="w-6 h-6 text-zinc-500"></i>
                </div>
            </div>
            <div class="flex items-baseline gap-2">
                <span id="display-balance" class="text-4xl font-extrabold italic">$135,683.23</span>
                <span class="text-green-500 font-bold text-sm">▲ 23.35%</span>
            </div>
        </header>

        <div class="px-6 flex gap-4 mb-4 text-sm font-bold border-b border-zinc-900">
            <button class="pb-2 border-b-2 border-white">Trending</button>
            <button class="pb-2 text-zinc-500">Large Cap</button>
            <button class="pb-2 text-zinc-500">Newly listed</button>
        </div>

        <div id="coin-list" class="flex-1 overflow-y-auto px-6 space-y-6 pb-24">
            </div>
    </div>

    <div id="view-trade" class="fixed inset-0 bg-black z-50 hidden flex flex-col">
        <header class="p-6 flex justify-between items-center">
            <button onclick="changeView('market')"><i data-lucide="chevron-left" class="w-8 h-8"></i></button>
            <div class="text-center">
                <h2 id="trade-coin-name" class="font-bold text-lg">$CHILLGUY</h2>
                <div class="flex items-center gap-1 justify-center">
                    <span class="w-2 h-2 rounded-full bg-purple-500"></span>
                    <span class="text-[10px] text-zinc-400 font-bold uppercase tracking-widest">Open</span>
                </div>
            </div>
            <button class="bg-zinc-800 px-4 py-1 rounded-full text-xs font-bold">Following</button>
        </header>

        <div class="px-6 flex justify-between items-end mb-8">
            <div class="w-16 h-16 rounded-2xl bg-zinc-800" id="trade-coin-img"></div>
            <div class="text-right">
                <p id="trade-coin-mcap" class="text-2xl font-bold">$211.8M</p>
                <p class="text-zinc-500 text-xs font-bold uppercase tracking-widest">Market cap</p>
            </div>
        </div>

        <div class="flex-1 relative px-2">
            <svg id="custom-chart" class="w-full h-full" viewBox="0 0 400 200" preserveAspectRatio="none">
                <defs>
                    <linearGradient id="gradient" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.3" />
                        <stop offset="100%" style="stop-color:#22c55e;stop-opacity:0" />
                    </defs>
                </defs>
                <path id="chart-path-area" class="chart-area" d=""></path>
                <path id="chart-path-line" class="chart-line" d=""></path>
                <g id="chart-dots"></g>
            </svg>
        </div>

        <div class="p-6 space-y-6 bg-zinc-900/30 rounded-t-3xl border-t border-white/5">
            <div class="flex justify-between items-center">
                <div>
                    <p id="trade-user-pos" class="text-2xl font-bold">$3,200.23</p>
                    <p class="text-zinc-500 text-xs">529.12K tokens</p>
                </div>
                <div class="text-right">
                    <p class="text-green-500 text-xl font-bold">+$1,200.23</p>
                    <p class="text-green-500 text-xs font-bold italic">▲ 33.35%</p>
                </div>
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <button onclick="trade('sell')" class="bg-zinc-800 py-4 rounded-2xl font-bold text-lg active:scale-95 transition">Sell</button>
                <button onclick="trade('buy')" class="fomo-purple py-4 rounded-2xl font-bold text-lg active:scale-95 transition">Buy</button>
            </div>
        </div>
    </div>

    <div id="view-profile" class="flex-1 flex flex-col overflow-hidden hidden">
        <div class="p-6 flex justify-between items-start">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 rounded-full bg-gradient-to-tr from-purple-500 to-pink-500"></div>
                <div>
                    <p class="font-bold">@saxon_ratliff</p>
                    <p class="text-xs text-zinc-500">Saxon Ratliff</p>
                </div>
            </div>
            <i data-lucide="settings" class="w-6 h-6"></i>
        </div>
        
        <div class="px-6 flex justify-between py-4">
            <div class="text-center"> <p class="font-bold">77</p> <p class="text-[10px] text-zinc-500 uppercase">Trades</p> </div>
            <div class="text-center"> <p class="font-bold">441</p> <p class="text-[10px] text-zinc-500 uppercase">Followers</p> </div>
            <div class="text-center"> <p class="font-bold">842</p> <p class="text-[10px] text-zinc-500 uppercase">Following</p> </div>
        </div>

        <div class="p-6 card-dark m-6 rounded-3xl">
            <p class="text-zinc-500 text-xs uppercase font-bold tracking-widest mb-1">Cash balance</p>
            <p id="cash-balance" class="text-3xl font-extrabold mono italic">$33,392.12</p>
        </div>

        <div class="px-6 flex-1 overflow-y-auto">
            <h3 class="font-bold mb-4">Open positions</h3>
            <div id="profile-positions" class="space-y-4"></div>
        </div>
    </div>

    <nav class="h-20 bg-black/80 backdrop-blur-md border-t border-white/5 flex justify-around items-center px-4 fixed bottom-0 w-full max-w-md">
        <button onclick="changeView('market')" class="nav-item nav-active"><i data-lucide="home"></i></button>
        <button onclick="changeView('market')" class="nav-item text-zinc-500"><i data-lucide="bar-chart-2"></i></button>
        <button onclick="changeView('profile')" class="nav-item text-zinc-500"><i data-lucide="user"></i></button>
    </nav>

    <script>
        // --- CONFIG & STATE ---
        let balance = 135683.23;
        let activeCoin = null;
        let myPortfolio = {};
        let coins = [];
        
        const REAL_COINS = ["BTC", "ETH", "SOL", "BNB", "XRP", "ADA", "DOGE", "AVAX", "DOT", "LINK", "MATIC", "LTC", "SHIB", "TRX", "DAI"];
        const MEME_NAMES = ["CHILLGUY", "PEPE", "MOG", "MOODENG", "GOAT", "TRUMP", "POPCAT", "WIF", "BONK", "FLOKI", "BOME", "MYRO", "SLERF", "MEW", "GIGA", "ZEREBRO", "FARTCOIN", "AI16Z", "SPX6900", "BODEN"];

        // --- CORE ENGINES ---
        function init() {
            lucide.createIcons();
            generateAllCoins();
            updateMarketUI();
            startPriceEngine();
        }

        function generateAllCoins() {
            // Criar 15 moedas reais estáveis
            REAL_COINS.forEach(n => coins.push(createCoin(n, false)));
            // Criar 35+ memecoins
            for(let i=0; i<40; i++) {
                const name = i < MEME_NAMES.length ? MEME_NAMES[i] : `MEME_${i}`;
                coins.push(createCoin(name, true));
            }
        }

        function createCoin(name, isMeme) {
            const isAntiRug = isMeme && Math.random() > 0.6; // 40% são seguras
            return {
                id: Math.random().toString(36).substr(2, 9),
                name,
                price: isMeme ? (Math.random() * 0.01) : (20 + Math.random() * 60000),
                change: 3.35,
                isMeme,
                isAntiRug,
                isRugged: false,
                mcap: isMeme ? (50 + Math.random() * 500) : (1000 + Math.random() * 900000),
                createdAt: Date.now(),
                history: Array.from({length: 20}, () => 50 + Math.random() * 50),
                dots: [] // Para guardar pontos de compra/venda no gráfico
            };
        }

        // --- CUSTOM CHART RENDERER (SVG) ---
        function renderCustomChart() {
            const svg = document.getElementById('custom-chart');
            const pathLine = document.getElementById('chart-path-line');
            const pathArea = document.getElementById('chart-path-area');
            const dotsGroup = document.getElementById('chart-dots');
            
            const data = activeCoin.history;
            const width = 400;
            const height = 200;
            const min = Math.min(...data) * 0.95;
            const max = Math.max(...data) * 1.05;
            
            const points = data.map((val, i) => ({
                x: (i / (data.length - 1)) * width,
                y: height - ((val - min) / (max - min)) * height
            }));

            // Criar linha curva (Cubic Bézier Approximation)
            let d = `M ${points[0].x} ${points[0].y}`;
            for (let i = 0; i < points.length - 1; i++) {
                const p0 = points[i];
                const p1 = points[i + 1];
                const cp1x = p0.x + (p1.x - p0.x) / 2;
                d += ` C ${cp1x} ${p0.y}, ${cp1x} ${p1.y}, ${p1.x} ${p1.y}`;
            }

            pathLine.setAttribute('d', d);
            pathArea.setAttribute('d', d + ` L ${width} ${height} L 0 ${height} Z`);
            
            // Renderizar Pontos de Trade (Buy/Sell)
            dotsGroup.innerHTML = '';
            activeCoin.dots.forEach(dot => {
                const dotIdx = Math.floor(Math.random() * (points.length - 2)) + 1; // Simulação de posição
                const p = points[dotIdx];
                const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                circle.setAttribute("cx", p.x);
                circle.setAttribute("cy", p.y);
                circle.setAttribute("r", "6");
                circle.setAttribute("class", dot.type === 'buy' ? 'buy-dot' : 'sell-dot');
                dotsGroup.appendChild(circle);
            });
        }

        // --- SIMULATION ENGINE ---
        function startPriceEngine() {
            setInterval(() => {
                const now = Date.now();
                coins.forEach(c => {
                    if(c.isRugged) {
                        c.price *= 0.5;
                        c.history.push(c.price);
                        c.history.shift();
                        return;
                    }

                    let vol = c.isMeme ? 0.12 : 0.002;
                    let move = 1 + (Math.random() * vol * 2 - vol);
                    c.price *= move;
                    
                    // Lógica Rug Pull
                    if(c.isMeme && !c.isAntiRug && (now - c.createdAt) > 300000) {
                        if(Math.random() < 0.01) { // 1% de chance de crash a cada 2s
                            c.isRugged = true;
                            c.price *= 0.01;
                        }
                    }

                    c.history.push(c.price);
                    c.history.shift();
                });

                if(activeCoin) {
                    renderCustomChart();
                    document.getElementById('trade-coin-price-top')?.innerText = `$${activeCoin.price.toFixed(4)}`;
                }
                updateMarketUI();
                updateProfileUI();
            }, 2000);
        }

        // --- UI FUNCTIONS ---
        function updateMarketUI() {
            const list = document.getElementById('coin-list');
            list.innerHTML = '';
            coins.forEach(c => {
                const div = document.createElement('div');
                div.className = "flex justify-between items-center cursor-pointer active:opacity-50 transition";
                div.onclick = () => openTrade(c);
                div.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-xl bg-zinc-900 flex items-center justify-center font-bold text-[10px] text-zinc-600">
                            <img src="https://api.dicebear.com/7.x/identicon/svg?seed=${c.name}" class="rounded-xl">
                        </div>
                        <div>
                            <p class="font-bold tracking-tight">${c.name} <span class="text-[10px] text-zinc-600">${c.isAntiRug ? '🛡️' : ''}</span></p>
                            <p class="text-zinc-500 text-xs font-bold">$${(c.mcap).toFixed(2)}K MC</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="font-bold mono italic">$${c.price < 1 ? c.price.toFixed(6) : c.price.toLocaleString()}</p>
                        <p class="${c.isRugged ? 'text-red-600' : 'text-green-500'} text-xs font-bold">▲ ${c.change}%</p>
                    </div>
                `;
                list.appendChild(div);
            });
            document.getElementById('display-balance').innerText = `$${balance.toLocaleString()}`;
        }

        function updateProfileUI() {
            const container = document.getElementById('profile-positions');
            container.innerHTML = '';
            Object.keys(myPortfolio).forEach(id => {
                const pos = myPortfolio[id];
                const coin = coins.find(c => c.id === id);
                container.innerHTML += `
                    <div class="flex justify-between items-center py-2">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-lg bg-zinc-800"></div>
                            <div>
                                <p class="font-bold text-sm">${coin.name}</p>
                                <p class="text-[10px] text-zinc-500">$${pos.amount.toFixed(2)} tokens</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="font-bold text-sm">$${(pos.amount * coin.price).toFixed(2)}</p>
                            <p class="text-green-500 text-[10px] font-bold">▲ 3.35%</p>
                        </div>
                    </div>
                `;
            });
            document.getElementById('cash-balance').innerText = `$${balance.toLocaleString()}`;
        }

        function openTrade(coin) {
            activeCoin = coin;
            document.getElementById('trade-coin-name').innerText = `$${coin.name}`;
            document.getElementById('trade-coin-mcap').innerText = `$${coin.mcap.toFixed(1)}M`;
            document.getElementById('view-trade').classList.remove('hidden');
            renderCustomChart();
        }

        function trade(type) {
            const amount = 3200; // Valor fixo da imagem para simulação
            if(type === 'buy' && balance >= amount) {
                balance -= amount;
                if(!myPortfolio[activeCoin.id]) myPortfolio[activeCoin.id] = { amount: 0, cost: 0 };
                myPortfolio[activeCoin.id].amount += amount / activeCoin.price;
                myPortfolio[activeCoin.id].cost += amount;
                activeCoin.dots.push({ type: 'buy' });
            } else if (type === 'sell' && myPortfolio[activeCoin.id]) {
                balance += myPortfolio[activeCoin.id].amount * activeCoin.price;
                delete myPortfolio[activeCoin.id];
                activeCoin.dots.push({ type: 'sell' });
            }
            renderCustomChart();
            updateProfileUI();
        }

        function changeView(v) {
            document.getElementById('view-market').classList.toggle('hidden', v !== 'market');
            document.getElementById('view-profile').classList.toggle('hidden', v !== 'profile');
            document.getElementById('view-trade').classList.add('hidden');
            
            // Update nav colors
            document.querySelectorAll('.nav-item').forEach(el => el.classList.replace('fomo-text-purple', 'text-zinc-500'));
            // logic here
        }

        window.onload = init;
    </script>
</body>
</html>
