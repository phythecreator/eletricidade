<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RugPump • Pump or Rug</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .value { color: #ffffff; }
    .tab-active { border-bottom: 4px solid #c026d3; color: #c026d3; }
  </style>
</head>
<body class="bg-[#0f0a1f] text-white min-h-screen">

  <!-- TOP BAR -->
  <div class="bg-[#1a1433] border-b border-purple-600 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-8 py-5 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <span class="text-5xl">🔥</span>
        <h1 class="text-4xl font-bold tracking-tighter">RUGPUMP</h1>
      </div>
      <div class="flex gap-10 text-lg font-medium">
        <button onclick="switchTab(0)" id="tab-0" class="tab-active px-6 py-2">Discover</button>
        <button onclick="switchTab(1)" id="tab-1" class="px-6 py-2">Portfolio</button>
        <button onclick="switchTab(2)" id="tab-2" class="px-6 py-2">Create</button>
        <button onclick="switchTab(3)" id="tab-3" class="px-6 py-2">Profile</button>
      </div>
      <div class="flex items-center gap-6">
        <div class="text-right">
          <p class="text-purple-300 text-sm">Saldo</p>
          <p id="balance" class="value text-3xl font-bold">$18,742</p>
        </div>
      </div>
    </div>
  </div>

  <!-- DISCOVER -->
  <div id="screen-0" class="max-w-7xl mx-auto px-8 py-10">
    <h2 class="text-4xl font-semibold mb-8">Market Live</h2>
    <div id="coin-list" class="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-6"></div>
  </div>

  <!-- PORTFOLIO -->
  <div id="screen-1" class="hidden max-w-7xl mx-auto px-8 py-10">
    <h2 class="text-4xl font-semibold mb-8">Portfolio</h2>
    <div class="bg-[#1a1433] rounded-3xl p-8 mb-10">
      <div class="flex justify-between">
        <div>
          <p class="text-purple-300">Valor Total</p>
          <p id="portfolio-total" class="value text-6xl font-bold">$24,893</p>
        </div>
        <div class="text-right">
          <p class="text-emerald-400 text-2xl font-semibold" id="portfolio-pnl">+$4,821 (+23.9%)</p>
        </div>
      </div>
    </div>
    <h3 class="text-xl mb-5">Posições Abertas</h3>
    <div id="open-positions" class="space-y-4"></div>
  </div>

  <!-- CREATE -->
  <div id="screen-2" class="hidden max-w-7xl mx-auto px-8 py-10">
    <h2 class="text-4xl font-semibold mb-8">Criar Nova Memecoin</h2>
    <div class="max-w-md mx-auto bg-[#1a1433] rounded-3xl p-10">
      <input id="create-name" placeholder="Nome da memecoin" class="w-full bg-[#0f0a1f] rounded-2xl px-6 py-5 mb-4 text-lg">
      <input id="create-symbol" placeholder="Símbolo (ex: $GOAT)" class="w-full bg-[#0f0a1f] rounded-2xl px-6 py-5 mb-8 uppercase">
      <button onclick="createMemecoin()" class="w-full bg-gradient-to-r from-purple-600 to-pink-600 py-7 text-2xl font-bold rounded-3xl">LAUNCH 🔥</button>
    </div>
  </div>

  <!-- PROFILE -->
  <div id="screen-3" class="hidden max-w-7xl mx-auto px-8 py-10">
    <h2 class="text-4xl font-semibold mb-8">Perfil</h2>
    <div class="bg-[#1a1433] rounded-3xl p-10 text-center">
      <p class="text-purple-300">Trades fechadas</p>
      <p class="text-6xl font-bold value mt-2" id="closed-trades">31</p>
      <p class="text-emerald-400 text-3xl mt-8">+ $11,284 lucro total</p>
    </div>
  </div>

  <!-- COIN MODAL -->
  <div id="modal" onclick="if(event.target===this)closeModal()" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[100]">
    <div onclick="event.stopImmediatePropagation()" class="bg-[#1a1433] rounded-3xl w-full max-w-3xl mx-4 p-8">
      <div class="flex justify-between mb-6">
        <div id="modal-header" class="flex items-center gap-4 text-3xl font-bold"></div>
        <button onclick="closeModal()" class="text-5xl leading-none">×</button>
      </div>

      <div class="flex justify-between items-baseline mb-8">
        <div id="modal-price" class="text-6xl font-bold value"></div>
        <div id="modal-change" class="text-4xl font-bold"></div>
      </div>

      <!-- TIMEFRAMES -->
      <div class="flex gap-8 mb-4 text-sm font-medium">
        <button onclick="setTimeframe(0)" id="tf-0" class="tab-active">LIVE</button>
        <button onclick="setTimeframe(1)" id="tf-1">1H</button>
        <button onclick="setTimeframe(2)" id="tf-2">4H</button>
        <button onclick="setTimeframe(3)" id="tf-3">1D</button>
      </div>

      <canvas id="priceChart" class="mb-8" height="320"></canvas>

      <!-- STATS -->
      <div class="grid grid-cols-3 gap-6 mb-10 text-center">
        <div><p class="text-purple-300 text-sm">Market Cap</p><p id="modal-mc" class="value text-2xl font-semibold"></p></div>
        <div><p class="text-purple-300 text-sm">Volume 24h</p><p id="modal-vol" class="value text-2xl font-semibold"></p></div>
        <div><p class="text-purple-300 text-sm">Holders</p><p id="modal-holders" class="value text-2xl font-semibold"></p></div>
      </div>

      <div id="modal-warning" class="mb-8"></div>

      <div class="flex gap-4">
        <button onclick="buyCoin()" class="flex-1 bg-emerald-500 text-black py-6 text-3xl font-bold rounded-3xl">BUY</button>
        <button onclick="sellCoin()" class="flex-1 bg-red-500 py-6 text-3xl font-bold rounded-3xl">SELL</button>
      </div>
    </div>
  </div>

  <script>
    let coins = [ /* 55+ coins com dados realistas */ 
      {id:1, name:"Bitcoin", symbol:"BTC", price:66234, change:0.8, mc:"1.31T", vol:"41.8B", holders:"48.2M", warning:"", logo:"₿", volatility:0.3},
      {id:2, name:"Ethereum", symbol:"ETH", price:2489, change:-0.4, mc:"299B", vol:"17.9B", holders:"31.8M", warning:"", logo:"Ξ", volatility:0.5},
      {id:3, name:"Solana", symbol:"SOL", price:148.7, change:5.2, mc:"68.4B", vol:"3.1B", holders:"11.9M", warning:"Low Liquidity", logo:"◎", volatility:1.8},
      // ... (mais 52 memecoins geradas automaticamente)
    ];

    const memeSymbols = ["PEPE","WIF","BONK","MOG","GOAT","BRETT","POPCAT","MOODENG","CHILLGUY","FARTCOIN","DOGE","SHIB","NEIRO","TURBO"];
    for (let i = 4; i <= 55; i++) {
      const sym = memeSymbols[Math.floor(Math.random() * memeSymbols.length)];
      coins.push({
        id: i,
        name: sym + " Coin",
        symbol: "$" + sym,
        price: parseFloat((Math.random() * 0.15).toFixed(8)),
        change: parseFloat((Math.random() * 140 - 45).toFixed(1)),
        mc: (Math.random() * 1200 + 8).toFixed(1) + "M",
        vol: (Math.random() * 180 + 2).toFixed(1) + "M",
        holders: Math.floor(Math.random()*800 + 50) + "K",
        warning: Math.random() < 0.7 ? ["Low Volume","Low Liquidity","Possible Scam","High Risk"][Math.floor(Math.random()*4)] : "",
        logo: "🪙",
        volatility: 3.5
      });
    }

    let userBalance = 18742;
    let portfolio = []; // {coinId, amount, avgBuyPrice}
    let closedTrades = 31;
    let currentCoin = null;
    let chart = null;

    function renderDiscover() {
      const container = document.getElementById("coin-list");
      container.innerHTML = "";
      coins.forEach(coin => {
        const card = document.createElement("div");
        card.className = "bg-[#1a1433] hover:bg-[#221c3f] rounded-3xl p-7 cursor-pointer transition";
        card.innerHTML = `
          <div class="flex items-center gap-4">
            <div class="text-5xl">${coin.logo}</div>
            <div class="flex-1">
              <p class="text-2xl font-bold">${coin.symbol}</p>
              <p class="text-purple-300">${coin.name}</p>
            </div>
            <div class="text-right">
              <p class="value text-3xl font-mono">$${coin.price < 1 ? coin.price.toFixed(8) : coin.price.toLocaleString()}</p>
              <p class="${coin.change >= 0 ? 'text-emerald-400' : 'text-red-400'} text-xl font-bold">${coin.change >= 0 ? '+' : ''}${coin.change}%</p>
            </div>
          </div>
          ${coin.warning ? `<div class="mt-5 inline-block bg-red-500/10 text-red-400 text-xs px-4 py-1.5 rounded-2xl">${coin.warning}</div>` : ''}
          <div class="mt-6 grid grid-cols-3 text-xs text-purple-300">
            <div>MC <span class="value">${coin.mc}</span></div>
            <div>Vol <span class="value">${coin.vol}</span></div>
            <div>Holders <span class="value">${coin.holders}</span></div>
          </div>
        `;
        card.onclick = () => openModal(coin);
        container.appendChild(card);
      });
    }

    function openModal(coin) {
      currentCoin = coin;
      document.getElementById("modal-header").innerHTML = `${coin.logo} ${coin.symbol} <span class="text-purple-300 text-2xl ml-3">${coin.name}</span>`;
      document.getElementById("modal-price").textContent = `$${coin.price < 1 ? coin.price.toFixed(8) : coin.price.toLocaleString()}`;
      document.getElementById("modal-change").innerHTML = `<span class="${coin.change >= 0 ? 'text-emerald-400' : 'text-red-400'}">${coin.change >= 0 ? '▲' : '▼'} ${coin.change}%</span>`;
      
      document.getElementById("modal-mc").textContent = coin.mc;
      document.getElementById("modal-vol").textContent = coin.vol;
      document.getElementById("modal-holders").textContent = coin.holders;

      const warn = document.getElementById("modal-warning");
      warn.innerHTML = coin.warning ? `<div class="bg-red-500/10 border border-red-400 text-red-400 px-6 py-4 rounded-3xl text-center">${coin.warning}</div>` : "";

      document.getElementById("modal").classList.remove("hidden");
      createRealChart(coin);
    }

    function createRealChart(coin) {
      const ctx = document.getElementById("priceChart");
      if (chart) chart.destroy();

      const basePrice = coin.price;
      const volatility = coin.volatility || 1;
      const dataPoints = Array.from({length: 50}, (_, i) => {
        const variation = (Math.random() - 0.5) * volatility * 2;
        return parseFloat((basePrice * (1 + variation * (i/30))).toFixed(coin.price < 1 ? 8 : 2));
      });

      chart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: Array(50).fill(''),
          datasets: [{
            data: dataPoints,
            borderColor: '#c026d3',
            borderWidth: 3.5,
            tension: 0.35,
            pointRadius: 0,
            fill: true,
            backgroundColor: 'rgba(192, 38, 211, 0.08)'
          }]
        },
        options: {
          plugins: { legend: { display: false } },
          scales: {
            y: { grid: { color: '#2a1f4a' }, ticks: { color: '#a3a3a3', font: { size: 12 } } },
            x: { grid: { color: '#2a1f4a' }, ticks: { display: false } }
          }
        }
      });
    }

    function buyCoin() {
      const amount = 100; // valor fixo para simplicidade (podes mudar)
      const cost = amount * currentCoin.price;
      if (userBalance < cost) return alert("Saldo insuficiente!");

      userBalance -= cost;
      const existing = portfolio.find(p => p.coinId === currentCoin.id);
      if (existing) {
        existing.amount += amount;
        existing.avgBuyPrice = (existing.avgBuyPrice * existing.amount + currentCoin.price * amount) / (existing.amount + amount);
      } else {
        portfolio.push({coinId: currentCoin.id, amount: amount, avgBuyPrice: currentCoin.price});
      }

      document.getElementById("balance").textContent = userBalance.toLocaleString();
      alert(`✅ Compraste ${amount} ${currentCoin.symbol}`);
      createRealChart(currentCoin); // atualiza gráfico com nova compra
      closeModal();
      renderPortfolio();
    }

    function sellCoin() {
      const holding = portfolio.find(p => p.coinId === currentCoin.id);
      if (!holding) return alert("Não tens esta coin!");

      const revenue = holding.amount * currentCoin.price;
      userBalance += revenue;
      const pnl = (currentCoin.price - holding.avgBuyPrice) * holding.amount;

      closedTrades++;
      portfolio = portfolio.filter(p => p.coinId !== currentCoin.id);

      document.getElementById("balance").textContent = userBalance.toLocaleString();
      alert(`💰 Vendeste tudo! Lucro: $${pnl.toFixed(2)}`);
      closeModal();
      renderPortfolio();
    }

    function renderPortfolio() {
      const container = document.getElementById("open-positions");
      container.innerHTML = portfolio.length === 0 
        ? `<p class="text-purple-300">Nenhuma posição aberta</p>`
        : portfolio.map(pos => {
            const coin = coins.find(c => c.id === pos.coinId);
            const currentValue = pos.amount * coin.price;
            const pnl = currentValue - (pos.amount * pos.avgBuyPrice);
            return `
              <div class="bg-[#1a1433] rounded-3xl p-6 flex justify-between items-center">
                <div>
                  <span class="font-bold text-xl">${coin.symbol}</span>
                  <span class="ml-4 text-purple-300">${pos.amount} unidades</span>
                </div>
                <div class="text-right">
                  <p class="value text-2xl">$${currentValue.toFixed(2)}</p>
                  <p class="${pnl >= 0 ? 'text-emerald-400' : 'text-red-400'}">${pnl >= 0 ? '+' : ''}$${pnl.toFixed(2)}</p>
                </div>
                <div class="flex gap-3">
                  <button onclick="quickBuy(${pos.coinId})" class="bg-emerald-500 text-black px-6 py-3 rounded-2xl text-sm font-bold">+ Buy</button>
                  <button onclick="quickSell(${pos.coinId})" class="bg-red-500 px-6 py-3 rounded-2xl text-sm font-bold">Sell</button>
                </div>
              </div>`;
          }).join('');
    }

    function quickBuy(id) { currentCoin = coins.find(c => c.id === id); buyCoin(); }
    function quickSell(id) { currentCoin = coins.find(c => c.id === id); sellCoin(); }

    function createMemecoin() {
      const name = document.getElementById("create-name").value || "New Memecoin";
      const symbol = document.getElementById("create-symbol").value.toUpperCase() || "$NEW";
      coins.unshift({
        id: Date.now(),
        name: name,
        symbol: symbol,
        price: 0.00042,
        change: 180,
        mc: "12.4M",
        vol: "4.8M",
        holders: "8.2K",
        warning: "High Risk",
        logo: "🆕",
        volatility: 4.5
      });
      renderDiscover();
      alert(`🚀 ${symbol} lançada com sucesso!`);
      switchTab(0);
    }

    function switchTab(n) {
      document.querySelectorAll('[id^="screen-"]').forEach(el => el.classList.add("hidden"));
      document.getElementById(`screen-${n}`).classList.remove("hidden");
      document.querySelectorAll('button[id^="tab-"]').forEach(el => el.classList.remove("tab-active"));
      document.getElementById(`tab-${n}`).classList.add("tab-active");
      if (n === 1) renderPortfolio();
    }

    function closeModal() {
      document.getElementById("modal").classList.add("hidden");
      if (chart) chart.destroy();
    }

    function setTimeframe(n) {
      document.querySelectorAll('#modal button').forEach(b => b.classList.remove("tab-active"));
      document.getElementById(`tf-${n}`).classList.add("tab-active");
      if (currentCoin) createRealChart(currentCoin);
    }

    // Atualização em tempo real
    function livePriceUpdate() {
      coins.forEach(coin => {
        if (coin.volatility) {
          const change = (Math.random() - 0.5) * coin.volatility;
          coin.change = parseFloat(change.toFixed(1));
          coin.price = parseFloat((coin.price * (1 + change/100)).toFixed(coin.price < 1 ? 8 : 2));
        }
      });
      renderDiscover();
    }

    window.onload = () => {
      renderDiscover();
      setInterval(livePriceUpdate, 2800);
    };
  </script>
</body>
</html>
